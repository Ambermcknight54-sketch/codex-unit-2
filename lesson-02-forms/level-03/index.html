    <h1>Level 03 — Message Field & Submit</h1>

      <div>

        <textarea 
          id="user-message" 
          name="message" 
          rows="5" 
          placeholder="Write your message here..."
          required
        ></textarea>
      </div>
      
      <button type="submit">Send Message</button>
