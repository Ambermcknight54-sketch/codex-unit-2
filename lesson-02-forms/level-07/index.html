<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Lesson 02 — Level 07</title>
  </head>
  <body>
    <h1>Level 07 — Labels & Accessibility</h1>
    <form>
      <section>
        <label for="full-name">Full Name</label>
        <input type="text" id="full-name" name="full_name" required />
      </section>

      <label>
        Email Address
        <input type="email" name="user_email" required />
      </label>

      <section>
        <label for="topic-select">Subject Matter</label>
        <select id="topic-select" name="topic">
          <option value="support">Technical Support</option>
          <option value="billing">Billing Inquiry</option>
        </select>
      </section>

      <label>
        Your Message
        <textarea name="message" rows="4"></textarea>
      </label>

      <button type="submit">Submit Form</button>
      <!-- TODO: Attach labels to controls. Use <label for="id"> or wrap the input inside <label>. -->
    </form>
  </body>
</html>
