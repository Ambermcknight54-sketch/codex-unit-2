<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Lesson 02 — Level 02</title>
  </head>
  <body>
    <h1>Level 02 — Name & Email Inputs</h1>

    <form action="/submit-handler" method="POST">
      <label for="email"
        >Email
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          required />
      </label>

      <label for="tel"
        >Phone
        <input type="tel" id="tel" name="tel" autocomplete="tel" />
      </label>

      <label for="password"
        >Password
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="new-password"
          required />
      </label>

      <label for="age"
        >Age (18-100)
        <input type="number" id="age" name="age" min="18" max="100" />
      </label>

      <label for="rating"
        >Rating (0-10)
        <input type="range" id="rating" name="rating" min="0" max="10" />
      </label>

      <label for="avatar"
        >Profile Photo
        <input type="file" id="avatar" name="avatar" accept="image/*" />
      </label>

      <label for="user-message"
        >Message
        <textarea
          id="user-message"
          name="message"
          rows="5"
          placeholder="Write your message here..."
          required></textarea>
      </label>

      <button type="submit">Submit</button>
      <!-- TODO: Add an input for the user's name -->
      <!-- TODO: Add an input for the user's email using type="email" -->
    </form>
  </body>
</html>
