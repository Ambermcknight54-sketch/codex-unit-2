<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Lesson 02 — Level 05</title>
  </head>
  <body>
    <h1>Level 05 — Select, Optgroup & Options</h1>
    <form>
     <form action="/submit-selection" method="POST">
      <div class="form-group">
        <label for="device-choice">Select your preferred device</label>
        <select id="device-choice" name="device" required>
          <option value="" disabled selected>-- Please choose an option --</option>
          
          <optgroup label="Mobile Devices">
            <option value="iphone">iPhone</option>
            <option value="android">Android Phone</option>
          </optgroup>
          
          <optgroup label="Desktop/Laptop">
            <option value="macbook">MacBook</option>
            <option value="windows-pc">Windows PC</option>
            <option value="linux-laptop">Linux Laptop</option>
          </optgroup>
        </select>
      </div>

      <button type="submit">Submit Choice</button>
      <!-- TODO: Add a select with options and at least one optgroup -->
    </form>
  </body>
</html>
