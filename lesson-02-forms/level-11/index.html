<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Lesson 02 — Level 11</title>
  </head>
  <body>
    <h1>Level 11 — Integrate & Polish</h1>
    <form>
      <fieldset>
        <legend>Contact Information</legend>

        <label for="full-name">Full Name</label>
        <input
          id="full-name"
          name="name"
          type="text"
          autocomplete="name"
          required />

        <label for="email">Email Address</label>
        <input
          id="email"
          name="email"
          type="email"
          autocomplete="email"
          required />
      </fieldset>

      <fieldset>
        <legend>Your Message</legend>

        <label for="message">Comments</label>
        <textarea
          id="message"
          name="message"
          rows="5"
          minlength="10"
          required></textarea>
      </fieldset>

      <button type="submit">Send Message</button>
      <!-- TODO: Combine all pieces: inputs, labels, fieldsets, validation, and submit control -->
    </form>
  </body>
</html>
